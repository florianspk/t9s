name: Security Audit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Every Monday at 08:00 UTC — catches new CVEs on unchanged code
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Full scan → SARIF (all severities, uploaded to GitHub Security tab)
      - name: Scan (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivy-config: trivy.yaml

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

      # Second pass → human-readable table, fails on CRITICAL/HIGH
      - name: Scan (table — fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivy-config: trivy.yaml
